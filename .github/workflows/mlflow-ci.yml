      echo "Latest Run ID: $RUN_ID"

  - name: Commit MLflow Artifacts
    run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      git add MLProject/mlruns || true

      git diff --staged --quiet || git commit -m "chore: update mlruns artifacts [skip ci]"

      git pull --rebase origin main

      git push origin main

  - name: Login Docker Hub
    uses: docker/login-action@v3
    with:
      username: brikcakristal
      password: ${{ secrets.BRIKCAKRISTAL }}

  - name: Build Docker Image
    run: |
      cd MLProject

      mlflow models build-docker \
        --model-uri "mlruns/0/${{ env.RUN_ID }}/artifacts/model" \
        --name "brikcakristal/telco-churn-model"

  - name: Tag Docker Image
    run: |
      docker tag \
        brikcakristal/telco-churn-model:latest \
        brikcakristal/telco-churn-model:${{ env.RUN_ID }}

  - name: Push Docker Image
    run: |
      docker push brikcakristal/telco-churn-model:latest
      docker push brikcakristal/telco-churn-model:${{ env.RUN_ID }}
