name: MLflow CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 pandas numpy scikit-learn

      - name: Check Environment
        run: |
          python --version
          pip --version
          docker --version

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          RUN_ID=$(python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient()
          exps = client.search_experiments()
          runs = client.search_runs(
              experiment_ids=[e.experiment_id for e in exps],
              order_by=['start_time DESC'],
              max_results=1
          )
          print(runs[0].info.run_id)
          ")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: Upload to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add MLProject/mlruns/ || true
          git diff --staged --quiet || git commit -m "chore: update mlruns artifacts [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Model
        run: |
          cd MLProject
          mlflow models build-docker \
            --model-uri "mlruns/0/${{ env.RUN_ID }}/artifacts/model" \
            --name "brikcakristal/telco-churn-model" \
            --env-manager local

      - name: Tag Docker Image
        run: |
          docker tag \
            brikcakristal/telco-churn-model:latest \
            brikcakristal/telco-churn-model:${{ env.RUN_ID }}

      - name: Push Docker Image
        run: |
          docker push brikcakristal/telco-churn-model:latest
          docker push brikcakristal/telco-churn-model:${{ env.RUN_ID }}
